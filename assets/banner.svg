<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#7b2ff7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00d2ff" flood-opacity="0.3"/>
    </filter>
    <filter id="textshadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#7b2ff7" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
    <line x1="1100" y1="0" x2="1100" y2="300"/>
  </g>

  <!-- Decorative glow orb left -->
  <circle cx="150" cy="150" r="120" fill="#7b2ff7" opacity="0.07"/>
  <circle cx="150" cy="150" r="60" fill="#00d2ff" opacity="0.05"/>

  <!-- Decorative glow orb right -->
  <circle cx="1050" cy="150" r="100" fill="#00d2ff" opacity="0.07"/>
  <circle cx="1050" cy="150" r="50" fill="#7b2ff7" opacity="0.05"/>

  <!-- GPU chip icon -->
  <g transform="translate(85, 90)" filter="url(#shadow)">
    <!-- Chip body -->
    <rect x="10" y="10" width="100" height="100" rx="8" fill="#1a1a3e" stroke="url(#accent)" stroke-width="2"/>
    <!-- Inner die -->
    <rect x="30" y="30" width="60" height="60" rx="4" fill="#0f0c29" stroke="url(#accent)" stroke-width="1.5"/>
    <!-- GPU text on die -->
    <text x="60" y="67" font-family="monospace" font-size="16" font-weight="bold" fill="url(#accent)" text-anchor="middle">GPU</text>
    <!-- Pins top -->
    <rect x="25" y="2" width="6" height="10" rx="1" fill="#00d2ff" opacity="0.8"/>
    <rect x="40" y="2" width="6" height="10" rx="1" fill="#00d2ff" opacity="0.8"/>
    <rect x="55" y="2" width="6" height="10" rx="1" fill="#00d2ff" opacity="0.8"/>
    <rect x="70" y="2" width="6" height="10" rx="1" fill="#00d2ff" opacity="0.8"/>
    <rect x="85" y="2" width="6" height="10" rx="1" fill="#00d2ff" opacity="0.8"/>
    <!-- Pins bottom -->
    <rect x="25" y="108" width="6" height="10" rx="1" fill="#00d2ff" opacity="0.8"/>
    <rect x="40" y="108" width="6" height="10" rx="1" fill="#00d2ff" opacity="0.8"/>
    <rect x="55" y="108" width="6" height="10" rx="1" fill="#00d2ff" opacity="0.8"/>
    <rect x="70" y="108" width="6" height="10" rx="1" fill="#00d2ff" opacity="0.8"/>
    <rect x="85" y="108" width="6" height="10" rx="1" fill="#00d2ff" opacity="0.8"/>
    <!-- Pins left -->
    <rect x="2" y="25" width="10" height="6" rx="1" fill="#7b2ff7" opacity="0.8"/>
    <rect x="2" y="40" width="10" height="6" rx="1" fill="#7b2ff7" opacity="0.8"/>
    <rect x="2" y="55" width="10" height="6" rx="1" fill="#7b2ff7" opacity="0.8"/>
    <rect x="2" y="70" width="10" height="6" rx="1" fill="#7b2ff7" opacity="0.8"/>
    <rect x="2" y="85" width="10" height="6" rx="1" fill="#7b2ff7" opacity="0.8"/>
    <!-- Pins right -->
    <rect x="108" y="25" width="10" height="6" rx="1" fill="#7b2ff7" opacity="0.8"/>
    <rect x="108" y="40" width="10" height="6" rx="1" fill="#7b2ff7" opacity="0.8"/>
    <rect x="108" y="55" width="10" height="6" rx="1" fill="#7b2ff7" opacity="0.8"/>
    <rect x="108" y="70" width="10" height="6" rx="1" fill="#7b2ff7" opacity="0.8"/>
    <rect x="108" y="85" width="10" height="6" rx="1" fill="#7b2ff7" opacity="0.8"/>
  </g>

  <!-- Main title -->
  <text x="310" y="130" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="72" font-weight="800" fill="white" filter="url(#textshadow)">
    Pod<tspan fill="url(#accent)">Pilot</tspan>
  </text>

  <!-- Subtitle -->
  <text x="315" y="170" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="18" fill="#8b8ba7" letter-spacing="3">
    AUTOPILOT FOR RUNPOD GPU INFRASTRUCTURE
  </text>

  <!-- Accent line -->
  <rect x="310" y="185" width="350" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Feature pills -->
  <g transform="translate(310, 205)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="#00d2ff" opacity="0.12" stroke="#00d2ff" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="65" y="18" font-family="'SF Mono', monospace" font-size="11" fill="#00d2ff" text-anchor="middle" font-weight="600">Smart GPU Pick</text>

    <rect x="145" y="0" width="140" height="28" rx="14" fill="#7b2ff7" opacity="0.12" stroke="#7b2ff7" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="215" y="18" font-family="'SF Mono', monospace" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">Pod Lifecycle</text>

    <rect x="300" y="0" width="160" height="28" rx="14" fill="#00d2ff" opacity="0.12" stroke="#00d2ff" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="380" y="18" font-family="'SF Mono', monospace" font-size="11" fill="#00d2ff" text-anchor="middle" font-weight="600">Volume Provision</text>

    <rect x="475" y="0" width="120" height="28" rx="14" fill="#7b2ff7" opacity="0.12" stroke="#7b2ff7" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="535" y="18" font-family="'SF Mono', monospace" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">Cost Tracking</text>
  </g>

  <!-- Terminal cursor blink decoration -->
  <g transform="translate(310, 250)">
    <text font-family="'SF Mono', monospace" font-size="13" fill="#4ade80" opacity="0.7">$</text>
    <text x="16" font-family="'SF Mono', monospace" font-size="13" fill="#8b8ba7" opacity="0.7"> pip install podpilot</text>
    <rect x="175" y="-2" width="8" height="16" fill="#00d2ff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Floating particles -->
  <circle cx="950" cy="60" r="2" fill="#00d2ff" opacity="0.4">
    <animate attributeName="cy" values="60;40;60" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="90" r="1.5" fill="#7b2ff7" opacity="0.3">
    <animate attributeName="cy" values="90;70;90" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="50" r="2.5" fill="#00d2ff" opacity="0.25">
    <animate attributeName="cy" values="50;35;50" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="920" cy="240" r="1.5" fill="#7b2ff7" opacity="0.35">
    <animate attributeName="cy" values="240;225;240" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="220" r="2" fill="#00d2ff" opacity="0.3">
    <animate attributeName="cy" values="220;200;220" dur="4.5s" repeatCount="indefinite"/>
  </circle>
</svg>
